<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
<script>
    var num = parseInt(prompt("1부터 7사이의 정수를 입력하세요: "));

    switch (num) {
        case 1:
            alert("월요일");
            break;
        case 2:
            alert("화요일");
            break;
        case 3:
            alert("수요일");
            break;
        case 4:
            alert("목요일");
            break;
        case 5:
            alert("금요일");
            break;
        case 6:
            alert("토요일");
            break;
        case 7:
            alert("일요일");
            break;
        default:
            alert("잘못된 입력입니다.");
    }
</script>
</body>
</html>
