<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset = "UTF-8">
<title> 함수 </title>
<script>
    /*
    재귀함수: 함수에서 자기자신 함수를 호출
    실무에서는 특별한 경우아니면 사용하지 X, 사용하지 않는 것을 권장
    참고만하세요. 실습 X
     */
	var num = 0;
	function testFnc(){
		num++;
		document.write(num, "<br>");
		if(num == 10) return;
		
		testFnc(); // 재귀함수도 가능하나 사용하지 말자
	}
	
	testFnc();
</script>
</head>
<body>
</body>
</html>
