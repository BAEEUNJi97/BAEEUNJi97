<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 슬라이드쇼 예제</title>
    <!-- Swiper.js CDN -->
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        .swiper-button-next, .swiper-button-prev {
            color: #fff;
            font-size: 18px;
            background: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="swiper-container">
    <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="이미지_경로_1.jpg" alt="이미지 1"></div>
        <div class="swiper-slide"><img src="이미지_경로_2.jpg" alt="이미지 2"></div>
        <div class="swiper-slide"><img src="이미지_경로_3.jpg" alt="이미지 3"></div>
        <!-- 필요한 만큼 이미지를 추가할 수 있습니다. -->
    </div>
    <!-- 이전/다음 버튼 -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>

    <!-- 추가적인 Swiper.js 스크립트 -->
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        // Swiper 초기화
        var mySwiper = new Swiper('.swiper-container', {
            // 옵션 설정 (자세한 옵션은 Swiper.js 문서 참조)
            loop: true, // 무한 루프 설정
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev'
            },
        });
    </script>
</div>
</body>
</html>
