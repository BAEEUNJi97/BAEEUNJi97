<body>
<script>
   var num1 = parseInt(prompt("첫 번째 숫자를 입력해 주세요"));
   var num2 = parseInt(prompt("두 번째 숫자를 입력해 주세요"));
   var num3 = parseInt(prompt("세 번째 숫자를 입력해 주세요"));

   var last = (num1+num2+num3)/3;

   document.write("세개 변수의 평균은?"+" "+ last +"입니다");
</script>
