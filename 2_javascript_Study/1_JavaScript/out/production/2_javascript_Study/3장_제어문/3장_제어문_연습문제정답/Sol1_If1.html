<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>나이 확인</title>
</head>
<body>
<script>
        var age = prompt("나이를 입력하세요: ");

        if (parseInt(age) >= 18) {
            alert("당신은 성인입니다.");
        } else {
            alert("당신은 미성년자입니다.");
        }
</script>
</body>
</html>
