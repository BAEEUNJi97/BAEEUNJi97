<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
<script>
    var age = parseInt(prompt("Enter your age."));

    var fee;

    // Constants definition
    const INFANT_BEGIN = 0;
    const INFANT_END = 3;

    const CHILD_BEGIN = 4;
    const CHILD_END = 13;

    const TEENAGER_BEGIN = 14;
    const TEENAGER_END = 18;

    const ADULT_BEGIN = 19;
    const ADULT_END = 65;

    const SENIOR_BEGIN = 66;

    if (age >= INFANT_BEGIN && age <= INFANT_END) {
        fee = 0;
    } else if (age >= CHILD_BEGIN && age <= CHILD_END) {
        fee = 2000;
    } else if (age >= TEENAGER_BEGIN && age <= TEENAGER_END) {
        fee = 3000;
    } else if (age >= ADULT_BEGIN && age <= ADULT_END) {
        fee = 5000;
    } else if (age >= SENIOR_BEGIN) {
        fee = 0;
    } else {
        alert("Invalid input.");
    }

    alert("The fee is " + fee + " won.");
</script>
</body>
</html>
