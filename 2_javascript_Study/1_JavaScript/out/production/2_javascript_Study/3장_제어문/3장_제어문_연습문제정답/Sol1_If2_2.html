<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>최댓값 찾기</title>
</head>
<body>
<script>
    var num1 = parseInt(prompt("첫번째 정수를 입력하세요: "));
    var num2 = parseInt(prompt("두번째 정수를 입력하세요: "));

    var max;
    // 요구사항이 변경
    // 예) 아래와 같이 문장 종료를 단답식으로 변경. 입니다 => 이다.
    // 예) 한글을 영어로 변경
    if (num1 > num2) {
        max = num1;
    } else {
        max = num2;
    }

    alert("두 수 중에서 큰 수는 " + max + "입니다.");
</script>
</body>
</html>
