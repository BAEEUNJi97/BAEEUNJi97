<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
<script>
    var total = parseInt(prompt("국영수 총점을 입력하세요: "));
    var level;

    // 270 <= total <= 300 : 파이썬이나 쿼리형태의 조건지정시 가능한 문법
    // 가능하면 사용하지 않는 것을 추천
    if (total <=300 && total >= 270) {
        level = 'A';
    } else if (total >= 240) {
        level = 'B';
    } else if (total >= 210) {
        level = 'C';
    } else if (total >= 180) {
        level = 'D';
    } else {
        level = 'F';
    }

    alert("당신은 " + level + "레벨입니다.");
</script>
</body>
</html>
