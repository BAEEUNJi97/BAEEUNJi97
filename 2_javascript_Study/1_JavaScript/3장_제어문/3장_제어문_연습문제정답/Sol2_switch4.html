<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
<script>
    var month = parseInt(prompt("Enter the month (1-12): "));

    var days;
    switch (month) {
        case 2:
            days = 28;
            break;
        case 4:
        case 6:
        case 9:
        case 11:
            days = 30;
            break;
        default:
            days = 31;
            break;
    }

    alert("The number of days in month " + month + " is " + days);
</script>
</body>
</html>
