<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
<script>
    var age = parseInt(prompt("나이를 입력하세요."));

    var grade;
    var fee;

    if (age >= 0 && age <= 3) {
        grade = "유아";
        fee = 0;
    } else if (age >= 4 && age <= 13) {
        grade = "어린이";
        fee = 2000;
    } else if (age >= 14 && age <= 18) {
        grade = "청소년";
        fee = 3000;
    } else if (age >= 19 && age <= 65) {
        grade = "성인";
        fee = 5000;
    } else if (age >= 66) {
        grade = "노인";
        fee = 0;
    } else {
        alert("다시 입력하세요.");
        // 예외 처리 또는 다른 조치를 취할 수 있음
    }
    alert("귀하는 " + grade + "등급이며 요금은 " + fee + "원 입니다.");

</script>
</body>
</html>
