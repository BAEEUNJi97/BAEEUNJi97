<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
<script>
    var num = parseInt(prompt("1부터 3사이의 정수를 입력하세요: "));

    switch (num) {
        case 1:
        case 2:
        case 3:
            alert("입력한 숫자는 " + num + "입니다.");
            break;
        default:
            alert("잘못된 입력입니다.");
    }

</script>
</body>
</html>
