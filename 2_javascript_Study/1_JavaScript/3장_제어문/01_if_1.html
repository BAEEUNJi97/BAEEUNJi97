<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>if</title>
</head>
<body>
<script>
<!--	prompt() 사용자 입력 처리-->
	let walkAmount = parseInt(prompt("당신의 하루 겉는 양은 몇 보인가요", "0"));

<!--	 형식 : if(조건식, 상수, 변수,)-->
<!--	 Case1] if (평가된 결과 ) : 참일 경우 -->
<!--	if( ) {불록이 실행}-->
<!--	 Case1] if (평가된 결과 ) : 거짓인 경우-->
<!-- if() {} 불록이 실행되지 않고, 건너간다.	-->
	if(walkAmount >=10000) {
	document.write("매우 좋은 습관을 지니고 계시는군요!!","<br>");
	}
	document.write("===========The End==========");
</script>
</body>
</html>
