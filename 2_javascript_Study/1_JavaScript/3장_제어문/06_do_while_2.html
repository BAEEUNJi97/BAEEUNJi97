<title> do while문 </title>
<script>
    let userNumber;

    do{
        userNumber = parseFloat(prompt("양수를 입력하세요:"));

        if(isNaN(userNumber) || userNumber <= 0)
        alert("잘못된 입력입니다. 유효한 양수를 입력해주세요");

    } while (isNaN(userNumber) || userNumber <= 0);
    console.log("유효한 양수를 입력하셨습니다:", userNumber);
