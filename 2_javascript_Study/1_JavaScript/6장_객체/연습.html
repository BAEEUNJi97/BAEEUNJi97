<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    //문자 길이
    let food = "치즈돈까스, 방가!".length;
    document.write("<p>돈까스 길이: " + food + "</p>")
    //문자 추출
    let food1 = "치즈돈까스, 방가!".charAt(3);
    document.write("<p>세번째 문자: " + food1 + "</p>")
    // 문자열 결합
    let food2 = "치즈돈까스,".concat("방가!");
    document.write("<p>결합된 문자: " + food2 + "</p>")
    // 문자열 검색
    let food3 = "치즈돈까스,방가!".indexOf("방가!");
    document.write("<p>방가 인덱스: " + food3 + "</p>")

</script>
</body>
</html>
