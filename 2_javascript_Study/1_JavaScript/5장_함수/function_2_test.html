<head>
	<meta charset = "UTF-8">
	<title> 함수 </title>
	<script>
		function myFnc(name, area) {
			document.write("안녕하세요. " + name + "가 제일 먹고싶은 과일입니다.", "<br>");
			document.write("이 과일의 유명한 디저트는 " + area + "입니다.", "<br><br>");
		}

		myFnc("포도", "포도즙");

		myFnc("딸기", "쇼트케이크");

	</script>
