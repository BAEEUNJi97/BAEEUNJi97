    let scores = [];

    for (let index= 0; true; index++) {
        let userInput = prompt('학생' + (index + 1) + '의 성적을 입력하세요 (중지는 q):');

        if (userInput === 'q') {
            break;
        }

        let score = parseFloat(userInput);
        scores.push(score);

    }

    // 총점 계산

    let score = 0;
    for (let i = 0; i < scores.length; i++) {
        score += scores[i];
    }

    let average = score / scores.length;
    //  텍스트 상에서 줄바꿈 문자 \n
    alert('총점: ' +score +'\n평균: '+average);
