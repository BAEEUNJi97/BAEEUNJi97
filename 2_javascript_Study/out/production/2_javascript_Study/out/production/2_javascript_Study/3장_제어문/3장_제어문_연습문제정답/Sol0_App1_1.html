<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
<script>
    var age = parseInt(prompt("나이를 입력하세요."));

    var fee;
// 0, 3, 4, 13 ..  문제에서 주어진 고정된 값: 상수 (Constant)
// 은 그대로 사용하는 것이 좋다.
    if (age >= 0 && age <= 3) {
        fee = 0;
    } else if (age >= 4 && age <= 13) {
        fee = 2000;
    } else if (age >= 14 && age <= 18) {
        fee = 3000;
    } else if (age >= 19 && age <= 65) {
        fee = 5000;
    } else if (age >= 66) {
        fee = 0;
    } else {
        alert("잘못된 입력입니다.");
    }

    alert("요금은 " + fee + "원 입니다.");
</script>
</body>
</html>
