<body>
<script>
   var num1 = parseInt(prompt("삼각형의 밑변길이를 넣어주세요"));

   var num2 = parseInt(prompt("삼각형의 높이를 넣어주세요"));

   var last = (num1+num2/2);


   document.write("삼각형의 밑변:"+" "+num1+"<p>" +
                  "삼각형의 밑변:"+" "+num2+"<p>"+
                   "삼각형의 밑변:"+" "+last);
</script>
</body>
