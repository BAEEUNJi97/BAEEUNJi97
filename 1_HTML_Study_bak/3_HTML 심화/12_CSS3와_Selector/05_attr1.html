<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>속성선택자</title>
    <style>
        ul{
            list-style:none;
        }
        li{
            width: 120px;
            display: inline-block;
            margin: 10px;
        }
        li a{
            padding: 5px 20px;
            font-size: 14px;
            color: blue;
            text-decoration: none;
        }
        a[href]{ /*속성 선택자 태그[속성]{스타일}*/
            background: yellow;
        }
    </style>
</head>
<body>
<ul>
    <li><a>메인 메뉴 : </a></li>
    <li><a href="#">메인 1</a> </li>
    <li><a href="#">메인 2</a> </li>
    <li><a href="#">메인 3</a> </li>
    <li><a href="#">메인 4</a> </li>
</ul>

</body>
</html>
