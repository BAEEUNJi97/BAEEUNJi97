<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>link 스타일</title>
    <style>
        .container {
            width: 200px;
            margin : 0 auto;
        }
        ul li {
            margin: 15px;
        }
    /*    추가된 요소에 스타일 지정*/
        li.hot::after{
            content: "NEW!!";
            font-size: x-small;
            padding: 2px 4px;
            margin: 0 10px;
            border-radius: 2px;
            background: #f00;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>제품 목록</h1>
    <ul>
        <li class="hot">제품 A</li>
        <li>제품 B</li>
        <li>제품 C</li>
        <li class="hot">제품 D</li>
    </ul>
</div>
</body>
</html>
