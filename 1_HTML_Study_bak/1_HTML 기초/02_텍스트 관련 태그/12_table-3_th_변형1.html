<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>표 만들기</title>
    <style>
        table, th, td {
            border:1px solid #ccc;
        }
        td {
            padding:5px;  /* 셀 테두리와 내용 사이의 간격(패딩) */
        }
    </style>
</head>
<!-- 아래 예제는 1열을 헤더로 변형한 예제임 -->
<body>
<table>
    <tr>
        <th>품목</th>
        <th>수량</th>
        <th>금액</th>
    </tr>
    <tr>
        <th>사 과</th>
        <td>5개</td>
        <td>10,000원</td>
    </tr>
    <tr>
        <th>딸 기</th>
        <td>1박스</td>
        <td>15,000원</td>
    </tr>
</table>
</body>
