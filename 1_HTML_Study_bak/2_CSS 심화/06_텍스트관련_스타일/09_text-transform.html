<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>text-transform</title>
    <style>
        .trans1{text-transform: uppercase;}
        .trans2{text-transform: capitalize;}
        /*
   그밖에 text-transform 속성중 lowercae(소문자), full-width(전각 문자) 도 있음
   */
    </style>
</head>
<body>
<h1>Have to study</h1>
<ul>
    <li class="trans1">html</li>
    <li class="trans2">css</li>
    <li class="trans2">javascript</li>
</ul>

</body>
</html>
