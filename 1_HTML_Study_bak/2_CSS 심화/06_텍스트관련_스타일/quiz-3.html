<html>
<head>
    <title>CSS Text Practice</title>
    <style>
        body {
            font-family: Verdana;
            color: #333;
            line-height: 1.5;
        }
   .red{
            font-weight: bold ;
            color: red;
        }
        .ita{
            font-style: italic;
        }
        .gray{
            color: gray;
            text-decoration: line-through;
        }
        .blue{
            color: blue;
            text-decoration: underline;
        }
        .small{
            font-size: small;
        }
        .lager{
            font-size: 2em;
        }
        .yellow{
            background-color: yellow;
        }


    </style>
</head>
<body>
<!-- 아래 모든 텍스트에서 라인별 스타일을 적용해 보세요. -->
<h1>This is a Heading</h1>
<p>This is a paragraph.</p>
<p class="red">This text should be bold</p>
<p class="ita">This text should be italicized</p>
<p class="gray">This text should be struck through</p>
<p class="blue">This text should be underlined</p>
<p class="small">This text should be smaller than the normal text</p>
<p class="lager">This text should be larger than the normal text</p>
<p><span class="yellow">This text should be highlighted</span></p>
</body>
</html>
